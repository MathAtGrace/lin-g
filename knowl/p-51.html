<p>Notice that we can see a bit more.  In <a href="" class="xref" data-knowl="./knowl/fig-three-possibilities.html" title="Figure 1.1.1">Figure 1.1.1</a>, we are looking at equations in two unknowns.  Here we see that</p>
<ul class="disc">
<li><p>One equation has infinitely solutions.</p></li>
<li><p>Two equations have exactly one solution.</p></li>
<li><p>Three equations have no solutions.</p></li>
